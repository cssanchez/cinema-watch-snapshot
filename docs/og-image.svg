<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0f14"/>
      <stop offset="55%" stop-color="#0c0f14"/>
      <stop offset="100%" stop-color="#06080d"/>
    </linearGradient>
    <radialGradient id="accent" cx="20%" cy="15%" r="70%">
      <stop offset="0%" stop-color="#f08b65" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#58c7b3" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58c7b3"/>
      <stop offset="100%" stop-color="#f08b65"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#accent)"/>
  <circle cx="1020" cy="110" r="160" fill="#58c7b3" fill-opacity="0.12"/>
  <rect x="90" y="360" width="1020" height="1" fill="#a5b2c6" fill-opacity="0.16"/>

  <g font-family="Aptos, Segoe UI, Trebuchet MS, sans-serif" fill="#f1ebe4">
    <text x="90" y="220" font-size="44" font-weight="700" opacity="0.95">Cine Vicio</text>
    <text x="90" y="280" font-size="26" font-weight="500" opacity="0.85">Cached cinema listings snapshot</text>
    <text x="90" y="335" font-size="20" font-weight="600" opacity="0.8">Fast showtime boards for today & tomorrow</text>
  </g>

  <g>
    <rect x="90" y="392" width="250" height="10" rx="5" fill="url(#bar)"/>
    <rect x="90" y="412" width="420" height="6" rx="3" fill="#58c7b3" fill-opacity="0.25"/>
  </g>
</svg>

